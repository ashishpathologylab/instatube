<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coding Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #667eea;
        }

        .result.show {
            display: block;
        }

        .result-text {
            color: #333;
            font-size: 16px;
        }

        .emoji {
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👨‍💻</div>
        <h1>Welcome to Coding</h1>
        <p class="subtitle">Start coding now - Simple Calculator</p>

        <div class="input-group">
            <label for="num1">पहला नंबर (First Number):</label>
            <input type="number" id="num1" placeholder="Enter first number">
        </div>

        <div class="input-group">
            <label for="num2">दूसरा नंबर (Second Number):</label>
            <input type="number" id="num2" placeholder="Enter second number">
        </div>

        <div>
            <button onclick="add()">➕ जोड़ें (Add)</button>
            <button onclick="subtract()">➖ घटाएं (Subtract)</button>
            <button onclick="multiply()">✖️ गुणा करें (Multiply)</button>
            <button onclick="divide()">➗ भाग दें (Divide)</button>
        </div>

        <div class="result" id="result">
            <p class="result-text">परिणाम (Result): <strong id="resultValue">0</strong></p>
        </div>
    </div>

    <script>
        function showResult(value) {
            document.getElementById('resultValue').innerText = value;
            document.getElementById('result').classList.add('show');
        }

        function add() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(num1) || isNaN(num2)) {
                alert('कृपया दोनों नंबर दर्ज करें (Please enter both numbers)');
                return;
            }
            
            const result = num1 + num2;
            showResult(result);
        }

        function subtract() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(num1) || isNaN(num2)) {
                alert('कृपया दोनों नंबर दर्ज करें (Please enter both numbers)');
                return;
            }
            
            const result = num1 - num2;
            showResult(result);
        }

        function multiply() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(num1) || isNaN(num2)) {
                alert('कृपया दोनों नंबर दर्ज करें (Please enter both numbers)');
                return;
            }
            
            const result = num1 * num2;
            showResult(result);
        }

        function divide() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(num1) || isNaN(num2)) {
                alert('कृपया दोनों नंबर दर्ज करें (Please enter both numbers)');
                return;
            }
            
            if (num2 === 0) {
                alert('0 से भाग नहीं दे सकते! (Cannot divide by zero)');
                return;
            }
            
            const result = num1 / num2;
            showResult(result);
        }

        // Console message
        console.log('🎉 Welcome to Coding! आपका कोडिंग प्रोजेक्ट शुरू हो गया!');
    </script>
</body>
</html>
